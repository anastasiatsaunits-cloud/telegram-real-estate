name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.8.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --no-frozen-lockfile

      - name: Build API
        run: pnpm --filter api build

      - name: Build miniapp
        run: pnpm --filter miniapp build

      - name: Setup check
        run: ./scripts/setup-check.sh
